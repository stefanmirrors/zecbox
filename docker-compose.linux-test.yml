services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.linux-test
    cap_add:
      - NET_ADMIN

  build:
    build:
      context: .
      dockerfile: Dockerfile.linux-test
    volumes:
      - ./dist-linux:/output
    command: >
      sh -c '
        mkdir -p /output &&
        cp target/release/bundle/appimage/*.AppImage /output/ 2>/dev/null || true &&
        cp target/release/bundle/deb/*.deb /output/ 2>/dev/null || true &&
        echo "Artifacts copied to ./dist-linux/"
      '

  shell:
    build:
      context: .
      dockerfile: Dockerfile.linux-test
    cap_add:
      - NET_ADMIN
    command: bash
    stdin_open: true
    tty: true
