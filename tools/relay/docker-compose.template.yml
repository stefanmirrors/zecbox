version: "3.8"
services:
  zecbox-relay:
    build: .
    container_name: zecbox-relay
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "8233:8233/tcp"
    volumes:
      - ./wg0.conf:/etc/wireguard/wg0.conf:ro
    environment:
      - TUNNEL_HOME_IP=${TUNNEL_HOME_IP:-10.13.37.2}
