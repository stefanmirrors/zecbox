name: Build App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: aarch64
            triple: aarch64-apple-darwin
          - runner: macos-14
            arch: x86_64
            triple: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch upstream binaries
        run: |
          chmod +x scripts/fetch-binaries.sh
          TARGET_TRIPLE=${{ matrix.triple }} scripts/fetch-binaries.sh

      - name: Build firewall helper
        run: |
          cargo build -p firewall-helper --release --target ${{ matrix.triple }}
          cp target/${{ matrix.triple }}/release/zecbox-firewall-helper src-tauri/binaries/zecbox-firewall-helper-${{ matrix.triple }}
          chmod +x src-tauri/binaries/zecbox-firewall-helper-${{ matrix.triple }}

      - name: Build app
        run: npx tauri build --target ${{ matrix.triple }}

      - name: Find DMG
        id: dmg
        run: |
          DMG_PATH=$(find target/${{ matrix.triple }}/release/bundle/dmg -name "*.dmg" | head -1)
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"

      - name: Create fixed-name copy
        run: cp "${{ steps.dmg.outputs.path }}" "target/${{ matrix.triple }}/release/bundle/dmg/zecbox-macos-${{ matrix.arch }}.dmg"

      - name: Generate SHA256
        run: |
          cd "target/${{ matrix.triple }}/release/bundle/dmg"
          shasum -a 256 "${{ steps.dmg.outputs.name }}" "zecbox-macos-${{ matrix.arch }}.dmg" > SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            ${{ steps.dmg.outputs.path }}
            target/${{ matrix.triple }}/release/bundle/dmg/zecbox-macos-${{ matrix.arch }}.dmg
            target/${{ matrix.triple }}/release/bundle/dmg/SHA256SUMS

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/dmg-aarch64/*.dmg
            artifacts/dmg-aarch64/SHA256SUMS
            artifacts/dmg-x86_64/*.dmg
            artifacts/dmg-x86_64/SHA256SUMS
