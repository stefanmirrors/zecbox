name: Build App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: aarch64
            triple: aarch64-apple-darwin
          - runner: macos-14
            arch: x86_64
            triple: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm -f $RUNNER_TEMP/certificate.p12

      - name: Fetch upstream binaries
        env:
          REAL_ARTI: "1"
        run: |
          chmod +x scripts/fetch-binaries.sh
          TARGET_TRIPLE=${{ matrix.triple }} scripts/fetch-binaries.sh

      - name: Build firewall helper
        run: |
          cargo build -p firewall-helper --release --target ${{ matrix.triple }}
          cp target/${{ matrix.triple }}/release/zecbox-firewall-helper src-tauri/binaries/zecbox-firewall-helper-${{ matrix.triple }}
          chmod +x src-tauri/binaries/zecbox-firewall-helper-${{ matrix.triple }}

      - name: Sign sidecar binaries
        if: env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for binary in zebrad arti zaino zecbox-firewall-helper; do
            BINARY_PATH="src-tauri/binaries/${binary}-${{ matrix.triple }}"
            if [ -f "$BINARY_PATH" ]; then
              echo "Signing $BINARY_PATH..."
              codesign --force --options runtime \
                --entitlements src-tauri/Entitlements.plist \
                --sign "$APPLE_SIGNING_IDENTITY" "$BINARY_PATH"
            fi
          done

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            export APPLE_SIGNING_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
          fi
          npx tauri build --target ${{ matrix.triple }}

      - name: Notarize DMG
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(find target/${{ matrix.triple }}/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Notarizing $DMG_PATH..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Find DMG
        id: dmg
        run: |
          DMG_PATH=$(find target/${{ matrix.triple }}/release/bundle/dmg -name "*.dmg" | head -1)
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"

      - name: Find update signature
        id: sig
        run: |
          SIG_FILE=$(find target/${{ matrix.triple }}/release/bundle/dmg -name "*.dmg.sig" 2>/dev/null | head -1 || true)
          if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            echo "signature=$SIG" >> "$GITHUB_OUTPUT"
            echo "has_sig=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sig=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create fixed-name copy
        run: cp "${{ steps.dmg.outputs.path }}" "target/${{ matrix.triple }}/release/bundle/dmg/zecbox-macos-${{ matrix.arch }}.dmg"

      - name: Generate SHA256
        run: |
          cd "target/${{ matrix.triple }}/release/bundle/dmg"
          shasum -a 256 "${{ steps.dmg.outputs.name }}" "zecbox-macos-${{ matrix.arch }}.dmg" > SHA256SUMS-macos-${{ matrix.arch }}

      - name: Copy sidecar binaries for release
        run: |
          mkdir -p target/${{ matrix.triple }}/release/bundle/sidecars
          for binary in zebrad arti zaino; do
            SRC="src-tauri/binaries/${binary}-${{ matrix.triple }}"
            if [ -f "$SRC" ]; then
              cp "$SRC" "target/${{ matrix.triple }}/release/bundle/sidecars/"
              (cd "target/${{ matrix.triple }}/release/bundle/sidecars" && shasum -a 256 "${binary}-${{ matrix.triple }}" >> SHA256SUMS)
            fi
          done

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            ${{ steps.dmg.outputs.path }}
            target/${{ matrix.triple }}/release/bundle/dmg/zecbox-macos-${{ matrix.arch }}.dmg
            target/${{ matrix.triple }}/release/bundle/dmg/SHA256SUMS-macos-${{ matrix.arch }}

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sidecars-${{ matrix.arch }}
          path: target/${{ matrix.triple }}/release/bundle/sidecars/

      - name: Save update metadata
        run: |
          mkdir -p /tmp/update-meta
          echo "${{ steps.sig.outputs.has_sig }}" > /tmp/update-meta/has_sig
          echo "${{ steps.sig.outputs.signature }}" > /tmp/update-meta/signature
          echo "${{ steps.dmg.outputs.name }}" > /tmp/update-meta/dmg_name

      - name: Upload update metadata
        uses: actions/upload-artifact@v4
        with:
          name: update-meta-${{ matrix.arch }}
          path: /tmp/update-meta/

  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            triple: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            arch: aarch64
            triple: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch upstream binaries
        env:
          REAL_ARTI: "1"
        run: |
          chmod +x scripts/fetch-binaries.sh
          TARGET_TRIPLE=${{ matrix.triple }} scripts/fetch-binaries.sh

      - name: Build firewall helper
        run: |
          cargo build -p firewall-helper --release --target ${{ matrix.triple }}
          cp target/${{ matrix.triple }}/release/zecbox-firewall-helper src-tauri/binaries/zecbox-firewall-helper-${{ matrix.triple }}
          chmod +x src-tauri/binaries/zecbox-firewall-helper-${{ matrix.triple }}

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.triple }}

      - name: Find artifacts
        id: artifacts
        run: |
          APPIMAGE=$(find target/${{ matrix.triple }}/release/bundle/appimage -name "*.AppImage" | head -1)
          DEB=$(find target/${{ matrix.triple }}/release/bundle/deb -name "*.deb" | head -1)
          echo "appimage=$APPIMAGE" >> "$GITHUB_OUTPUT"
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"

      - name: Stage Linux artifacts
        run: |
          mkdir -p staging
          cp target/${{ matrix.triple }}/release/bundle/appimage/*.AppImage staging/ 2>/dev/null || true
          cp target/${{ matrix.triple }}/release/bundle/deb/*.deb staging/ 2>/dev/null || true
          # Create fixed-name copies (version-independent, like macOS DMGs)
          cd staging
          for f in *.AppImage; do [ -f "$f" ] && cp "$f" "zecbox-linux-${{ matrix.arch }}.AppImage"; done
          for f in *.deb; do [ -f "$f" ] && cp "$f" "zecbox-linux-${{ matrix.arch }}.deb"; done
          sha256sum * > SHA256SUMS-linux-${{ matrix.arch }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: staging/

  build-windows:
    strategy:
      matrix:
        include:
          - runner: windows-latest
            arch: x86_64
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch upstream binaries
        shell: bash
        run: TARGET_TRIPLE=${{ matrix.triple }} bash scripts/fetch-binaries.sh

      - name: Download WinDivert SDK
        shell: pwsh
        run: |
          $WinDivertVersion = "2.2.2"
          $Url = "https://reqrypt.org/download/WinDivert-${WinDivertVersion}-A.zip"
          $ZipPath = "$env:TEMP/WinDivert.zip"
          $ExtractPath = "vendor/WinDivert"
          Invoke-WebRequest -Uri $Url -OutFile $ZipPath
          Expand-Archive -Path $ZipPath -DestinationPath "$env:TEMP/WinDivert-extract" -Force
          New-Item -ItemType Directory -Force -Path $ExtractPath | Out-Null
          $Inner = Get-ChildItem "$env:TEMP/WinDivert-extract" -Directory | Select-Object -First 1
          Copy-Item "$($Inner.FullName)/*" $ExtractPath -Recurse -Force

      - name: Build firewall helper
        shell: pwsh
        run: |
          $env:WINDIVERT_PATH = "$(Get-Location)/vendor/WinDivert/x64"
          cargo build -p firewall-helper --release --target ${{ matrix.triple }}
          Copy-Item "target/${{ matrix.triple }}/release/zecbox-firewall-helper.exe" "src-tauri/binaries/zecbox-firewall-helper-${{ matrix.triple }}.exe"
          # Bundle WinDivert DLL and driver alongside sidecars
          $WdDir = "vendor/WinDivert/x64"
          if (Test-Path "$WdDir/WinDivert.dll") {
            Copy-Item "$WdDir/WinDivert.dll" "src-tauri/binaries/"
            Copy-Item "$WdDir/WinDivert64.sys" "src-tauri/binaries/"
          }

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.triple }}

      - name: Find NSIS installer
        id: nsis
        shell: pwsh
        run: |
          $Installer = Get-ChildItem -Recurse "target/${{ matrix.triple }}/release/bundle/nsis/*.exe" | Select-Object -First 1
          echo "path=$($Installer.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($Installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "target/${{ matrix.triple }}/release/bundle/nsis/*.exe" staging/
          Copy-Item "${{ steps.nsis.outputs.path }}" "staging/zecbox-windows-${{ matrix.arch }}.exe"
          Push-Location staging
          Get-FileHash *.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Set-Content SHA256SUMS-windows-${{ matrix.arch }}
          Pop-Location

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: staging/

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/dmg-aarch64/*.dmg
            artifacts/dmg-aarch64/SHA256SUMS-*
            artifacts/dmg-x86_64/*.dmg
            artifacts/dmg-x86_64/SHA256SUMS-*
            artifacts/sidecars-aarch64/*
            artifacts/sidecars-x86_64/*
            artifacts/linux-x86_64/*.AppImage
            artifacts/linux-x86_64/*.deb
            artifacts/linux-x86_64/SHA256SUMS-*
            artifacts/linux-aarch64/*.AppImage
            artifacts/linux-aarch64/*.deb
            artifacts/linux-aarch64/SHA256SUMS-*
            artifacts/windows-x86_64/*.exe
            artifacts/windows-x86_64/SHA256SUMS-*

      - name: Generate app update JSONs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          for arch in aarch64 x86_64; do
            DMG_NAME=$(cat "artifacts/update-meta-${arch}/dmg_name")
            HAS_SIG=$(cat "artifacts/update-meta-${arch}/has_sig")
            SIG=""
            if [ "$HAS_SIG" = "true" ]; then
              SIG=$(cat "artifacts/update-meta-${arch}/signature")
            fi

            cat > "site/public/updates/app-darwin-${arch}.json" <<EOF
          {
            "version": "${VERSION}",
            "notes": "ZecBox ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-${arch}": {
                "url": "${REPO_URL}/${DMG_NAME}",
                "signature": "${SIG}"
              }
            }
          }
          EOF
          done

      - name: Commit and push app update JSONs
        run: |
          git config user.name "stefanmirrors"
          git config user.email "stefanmirrors@users.noreply.github.com"
          git add site/public/updates/app-darwin-*.json
          git diff --cached --quiet || git commit -m "Update app update manifests for ${GITHUB_REF#refs/tags/}"
          git push
