name: Build App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch upstream binaries
        run: |
          chmod +x scripts/fetch-binaries.sh
          scripts/fetch-binaries.sh

      - name: Build firewall helper
        run: |
          cargo build -p firewall-helper --release
          cp target/release/zecbox-firewall-helper src-tauri/binaries/zecbox-firewall-helper-aarch64-apple-darwin
          chmod +x src-tauri/binaries/zecbox-firewall-helper-aarch64-apple-darwin

      - name: Build app
        run: npx tauri build

      - name: Find DMG
        id: dmg
        run: |
          DMG_PATH=$(find target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256
        run: |
          cd "$(dirname "${{ steps.dmg.outputs.path }}")"
          shasum -a 256 "${{ steps.dmg.outputs.name }}" > SHA256SUMS

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.dmg.outputs.path }}
            target/release/bundle/dmg/SHA256SUMS
